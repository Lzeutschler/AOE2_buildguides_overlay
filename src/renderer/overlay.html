<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDRS Naechste Schritte</title>
    <link rel="stylesheet" href="./overlay.css">
  </head>
  <body>
    <section class="overlay">
      <div class="meta">
        <span class="overlay-brand">KDRS</span>
        <span id="overlayCiv">Generic</span>
        <strong id="overlayVillagers">6 Dorfb.</strong>
      </div>
      <ul class="resource-row" id="overlayResources" hidden>
        <li class="res-food"><img src="./assets/aoe2/resource-food.png" alt="Nahrung"><b id="resFood">-</b></li>
        <li class="res-wood"><img src="./assets/aoe2/resource-wood.png" alt="Holz"><b id="resWood">-</b></li>
        <li class="res-gold"><img src="./assets/aoe2/resource-gold.png" alt="Gold"><b id="resGold">-</b></li>
        <li class="res-stone"><img src="./assets/aoe2/resource-stone.png" alt="Stein"><b id="resStone">-</b></li>
      </ul>
      <ol class="step-list" id="overlaySteps"></ol>
    </section>
    <script src="./overlay.js"></script>
  </body>
</html>
